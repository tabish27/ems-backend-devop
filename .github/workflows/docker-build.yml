name: Build Docker Image

# Trigger pipeline on pushes to master branch
on:
  push:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      #checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Java
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 3️⃣ Build with Maven
      - name: Build JAR
        run: mvn clean package -DskipTests

      # 4️⃣ Build Docker image
      - name: Set up Docker Buildx
        run: docker/setup-buildx-action@v3

      # 5️⃣ Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6️⃣ Push Docker image
      - name: Build and Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/ems-backend-devop:${{ github.run_number }}
            ${{ secrets.DOCKER_USERNAME }}/ems-backend-devop:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max